name: Moodle Plugin CI

on: [push, pull_request]

jobs:
  # ── Linting (no database needed, runs fast on every push) ─────────────────
  lint:
    name: Lint (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: zip, gd, curl, intl
          coverage: none

      - name: Initialise moodle-plugin-ci
        run: |
          composer create-project -n --no-dev --prefer-dist \
            moodlehq/moodle-plugin-ci ci ^4
          echo $(cd ci && pwd)/bin >> $GITHUB_PATH
          echo CI_SRCDIR=$GITHUB_WORKSPACE >> $GITHUB_ENV

      - name: Install moodle-plugin-ci (no database)
        run: |
          moodle-plugin-ci install \
            --plugin ./ \
            --no-init-database \
            --moodle-branch=MOODLE_405_STABLE
        env:
          DB: pgsql

      - name: PHP Lint
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phplint

      - name: PHP Code Checker (0 warnings allowed)
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpcs --max-warnings 0

      - name: Mustache Lint
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci mustachelint

      - name: Javascript Lint
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci jslint

  # ── PHPUnit tests (matrix: PHP × database) ────────────────────────────────
  phpunit:
    name: PHPUnit (PHP ${{ matrix.php }}, ${{ matrix.database }})
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

      mariadb:
        image: mariadb:10.6
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: 'true'
          MYSQL_CHARACTER_SET_SERVER: utf8mb4
          MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']
        moodle-branch: ['MOODLE_405_STABLE']
        database: ['pgsql', 'mariadb']

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pgsql, mysqli, zip, gd, curl, intl
          coverage: none

      - name: Initialise moodle-plugin-ci
        run: |
          composer create-project -n --no-dev --prefer-dist \
            moodlehq/moodle-plugin-ci ci ^4
          echo $(cd ci && pwd)/bin >> $GITHUB_PATH
          echo CI_SRCDIR=$GITHUB_WORKSPACE >> $GITHUB_ENV

      - name: Install moodle-plugin-ci
        run: |
          moodle-plugin-ci install \
            --plugin ./ \
            --db-host=127.0.0.1 \
            --moodle-branch=${{ matrix.moodle-branch }}
        env:
          DB: ${{ matrix.database }}

      - name: PHPUnit
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpunit
